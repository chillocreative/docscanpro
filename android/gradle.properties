org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.io.tmpdir=D:\\.tmp
android.useAndroidX=true

# Kotlin's incremental compiler crashes when source files span multiple Windows
# drives (this project is on D:, pub cache is on C:). Disable IC so builds
# don't spam stack traces. See KT-51453.
kotlin.incremental=false
